<html>
    <head>
        <title> ID based selector</title>
        <style>
            #r{
                color:red;
                font-size:1cm;
                text-align: center;
                text-decoration: underline;
                font-family: cursive;

            }
            #b{
                color:blue;
                font-size:10mm;
                text-align: right;
                background-color: bisque;
                text-decoration: underline;
                font-family: cursive;

            }
            #y{
                color:yellow;
                font-size:50px;
                text-align: center;
                text-decoration: underline;
                font-family: cursive;
            }
        </style>
        
    </head>
    <body>
     <p id="r">Red rose</p>
     <p id="b"> Blue rose</p>
     <p id="y"> Yellow rose</p>

    </body>
</html>
